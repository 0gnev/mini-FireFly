# CI overrides (SPEC §15) — merged on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait
#
# Purpose: tune healthcheck waits so `--wait` is a meaningful gate on slower
# GitHub-hosted runners (more retries, longer start_period).
#
# NOTE on ports: the integration runner (scripts/itest.sh) drives the API over
# the HOST (http://localhost:8000, mock host ports 8081-8084, fanout 8090), so we
# KEEP the base file's published ports here. GitHub-hosted runners are isolated,
# single-tenant VMs, so there is no host-port collision risk. (If you ever run
# this on a shared/self-hosted runner, drive itest from inside the compose
# network instead of unpublishing ports.)

services:
  mysql:
    healthcheck:
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 40s

  redis:
    healthcheck:
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  clickhouse:
    healthcheck:
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s

  mock-a:
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
  mock-b:
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
  mock-c:
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
  mock-d:
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  fanout:
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  core:
    healthcheck:
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  prometheus:
    healthcheck:
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

  grafana:
    healthcheck:
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 15s
